<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail Mall Analytics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        #status {
            text-align: center;
            margin-bottom: 16px;
            color: #888;
            font-size: 14px;
        }

        button {
            display: block;
            margin: 0 auto 24px;
            padding: 10px 24px;
            background: #4A90E2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover { background: #357ABD; }

        /* Color tiles */
        .tiles-container {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .tile {
            width: 200px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .tile .aisle-name {
            font-size: 14px;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .tile .count {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .tile .level {
            font-size: 13px;
            opacity: 0.85;
        }

        .LOW    { background: #27AE60; }
        .MEDIUM { background: #F39C12; }
        .HIGH   { background: #E74C3C; }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        th {
            background: #4A90E2;
            color: white;
            padding: 14px;
            text-align: left;
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid #eee;
            color: #444;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f9f9f9; }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🏬 Retail Mall Analytics</h1>
    <p id="status">Loading data...</p>
    <button onclick="fetchLogs()">🔄 Refresh</button>

    <!-- Color tiles for top congested aisles -->
    <div class="tiles-container" id="tiles"></div>

    <!-- Full traffic log table -->
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Filename</th>
                <th>Aisle</th>
                <th>People Count</th>
                <th>Congestion</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        function getCongestionColor(level) {
            if (level === 'LOW') return '#27AE60';
            if (level === 'MEDIUM') return '#F39C12';
            return '#E74C3C';
        }

        function fetchLogs() {
            document.getElementById('status').textContent = 'Fetching data...';

            fetch('http://127.0.0.1:5000/traffic')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('table-body');
                    const tiles = document.getElementById('tiles');
                    tbody.innerHTML = '';
                    tiles.innerHTML = '';

                    if (data.length === 0) {
                        document.getElementById('status').textContent = 'No data yet. Upload some images!';
                        return;
                    }

                    // Build color tiles for top 3
                    const top3 = data.slice(0, 3);
                    top3.forEach(log => {
                        tiles.innerHTML += `
                            <div class="tile ${log.congestion_level}">
                                <div class="aisle-name">${log.aisle}</div>
                                <div class="count">${log.people_count}</div>
                                <div class="level">${log.congestion_level} congestion</div>
                            </div>
                        `;
                    });

                    // Build table rows
                    data.forEach(log => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${log.id}</td>
                                <td>${log.filename}</td>
                                <td>${log.aisle}</td>
                                <td>${log.people_count}</td>
                                <td>
                                    <span class="badge" style="background:${getCongestionColor(log.congestion_level)}">
                                        ${log.congestion_level}
                                    </span>
                                </td>
                                <td>${log.timestamp}</td>
                            </tr>
                        `;
                    });

                    document.getElementById('status').textContent = `Showing ${data.length} records`;
                })
                .catch(error => {
                    document.getElementById('status').textContent = 'Error fetching data. Is Flask running?';
                    console.error(error);
                });
        }

        fetchLogs();
    </script>

</body>
</html>
